<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Plática V3 — Comer</title><style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#4b2d1c;font-family:Arial,Helvetica,sans-serif}button{font:inherit}#game{position:relative;width:100vw;height:100vh;overflow:hidden;background:center/cover no-repeat}#game:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(0,0,0,.12),transparent 24%,transparent 76%,rgba(0,0,0,.12))}.title{position:absolute;z-index:30;top:10px;left:50%;transform:translateX(-50%);padding:7px 22px;border-radius:999px;background:#ffffffe8;color:#5b2d16;font-weight:800;font-size:clamp(18px,2.1vw,30px);box-shadow:0 4px 14px #0004}.object-tray{position:absolute;z-index:20;left:1%;right:1%;top:8%;display:flex;justify-content:center;gap:clamp(4px,.65vw,12px);pointer-events:none}.object{pointer-events:auto;width:clamp(58px,7.6vw,118px);height:clamp(58px,7.6vw,118px);border:2px solid #ffffffb5;border-radius:15px;background:#ffffffb8;padding:3px;cursor:pointer;box-shadow:0 4px 12px #0005;transition:.16s}.object:hover,.object:focus-visible{transform:translateY(-4px) scale(1.06);outline:none}.object.selected{border:4px solid #ffd34f;background:#fff}.object.on-table{opacity:.48}.object img{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 5px 5px #0005)}.character{position:absolute;z-index:16;bottom:0;width:clamp(180px,25vw,390px);height:70vh;border:0;background:transparent;padding:0;cursor:pointer;filter:drop-shadow(0 10px 10px #0005)}.character img{width:100%;height:100%;object-fit:contain;object-position:bottom;display:block}.character:hover,.character:focus-visible{transform:scale(1.025);outline:none}.character.active{filter:drop-shadow(0 0 16px #fff) drop-shadow(0 10px 10px #0005)}#boy{left:-2%}#girl{right:-2%}.table-stage{position:absolute;z-index:18;left:23%;right:23%;top:55%;bottom:7%;pointer-events:none}.placed{position:absolute;width:clamp(110px,14vw,220px);height:clamp(90px,12vw,180px);object-fit:contain;filter:drop-shadow(0 12px 7px #0007);transform:translate(-50%,-50%);animation:arrive .25s ease-out}@keyframes arrive{from{transform:translate(-50%,-50%) scale(.2);opacity:.2}to{transform:translate(-50%,-50%) scale(1);opacity:1}}.message{position:absolute;z-index:40;left:50%;bottom:2%;transform:translateX(-50%);min-width:min(88vw,340px);padding:10px 18px;border-radius:999px;background:#231812d1;color:#fff;text-align:center;font-weight:700;opacity:0;transition:.18s;pointer-events:none}.message.show{opacity:1}.help{position:absolute;z-index:35;left:50%;top:19%;transform:translateX(-50%);padding:7px 15px;border-radius:14px;background:#ffffffe0;color:#57311d;font-size:clamp(12px,1.4vw,18px);font-weight:700;text-align:center}.error{position:absolute;z-index:99;inset:0;display:grid;place-items:center;padding:30px;background:#f4eee5;color:#681d15;font-size:22px;text-align:center}@media(max-width:760px){.object-tray{top:7%;display:grid;grid-template-columns:repeat(5,1fr);gap:3px}.object{width:17vw;height:17vw;max-width:76px;max-height:76px}.help{top:24%}.character{width:43vw;height:55vh}.table-stage{left:18%;right:18%;top:58%;bottom:10%}.placed{width:28vw;height:22vw}.title{top:4px;padding:5px 16px}.message{bottom:1%;font-size:13px}}</style></head><body><main id="game"><div class="title" id="gameTitle">Comer</div><div class="help">Choose food, then click the boy or girl to hear that child.</div><div class="object-tray" id="tray"></div><div class="table-stage" id="tableStage"></div><div class="message" id="message" aria-live="polite"></div></main><script src="../../assets/games/game1.js"></script><script>
(()=>{'use strict';const game=document.getElementById('game'),tray=document.getElementById('tray'),stage=document.getElementById('tableStage'),message=document.getElementById('message'),title=document.getElementById('gameTitle');let selected=null,currentAudio=null,timer=null,placedCount=0;function say(t){message.textContent=t;message.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>message.classList.remove('show'),1800)}function stop(){if(currentAudio){currentAudio.pause();currentAudio.currentTime=0}}function place(item,button){selected=item;document.querySelectorAll('.object').forEach(b=>b.classList.remove('selected'));button.classList.add('selected','on-table');let old=stage.querySelector(`[data-id="${item.id}"]`);if(old)old.remove();const img=document.createElement('img');img.className='placed';img.src=item.image;img.alt=item.id.replaceAll('-',' ');img.dataset.id=item.id;const spots=[[50,48],[35,62],[65,62],[50,72],[28,42],[72,42]];const s=spots[placedCount++%spots.length];img.style.left=s[0]+'%';img.style.top=s[1]+'%';stage.appendChild(img);say('Now click the boy or the girl.')}function playChild(child,item,button){document.querySelectorAll('.character').forEach(b=>b.classList.remove('active'));button.classList.add('active');if(!item){say('Choose a food first.');return}const path=child==='boy'?item.boyAudio:item.girlAudio;const who=child==='boy'?'Boy':'Girl';if(!path){say(who+' audio has not been added yet.');return}stop();currentAudio=new Audio(path);currentAudio.play().then(()=>say(who+' speaking')).catch(()=>say(who+' audio has not been added yet.'));currentAudio.addEventListener('ended',()=>button.classList.remove('active'),{once:true})}try{const data=window.PLATICA_GAME1;if(!data)throw Error('Game data could not be loaded.');title.textContent=data.title||'Comer';game.style.backgroundImage=`url("${data.environment.backgroundImage}")`;(data.characters||[]).forEach(c=>{const b=document.createElement('button');b.className='character';b.id=c.id;b.type='button';b.setAttribute('aria-label',c.name+' speaks');const im=document.createElement('img');im.src=c.image;im.alt=c.name;b.appendChild(im);b.onclick=()=>playChild(c.id,selected,b);game.appendChild(b)});(data.objects||[]).forEach(item=>{const b=document.createElement('button');b.className='object';b.type='button';b.setAttribute('aria-label','Place '+item.id.replaceAll('-',' ')+' on table');const im=document.createElement('img');im.src=item.image;im.alt=item.id.replaceAll('-',' ');im.draggable=false;b.appendChild(im);b.onclick=()=>place(item,b);tray.appendChild(b)})}catch(e){const d=document.createElement('div');d.className='error';d.textContent=e.message;document.body.appendChild(d)}})();</script></body></html>
