<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Platicar</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;

      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(
        135deg,
        #f8f3e7,
        #dceeff
      );

      color: #243447;
    }

    .placeholder {
      width: min(700px, 100%);

      padding: 50px 30px;

      text-align: center;

      background: white;

      border: 3px solid #3f6f8f;
      border-radius: 24px;

      box-shadow:
        0 14px 35px
        rgba(0, 0, 0, 0.18);
    }

    h1 {
      margin: 0 0 20px;

      font-size: clamp(
        2.8rem,
        9vw,
        5rem
      );

      color: #245b78;
    }

    p {
      margin: 0 auto;

      max-width: 520px;

      font-size: clamp(
        1.1rem,
        4vw,
        1.5rem
      );

      line-height: 1.5;
    }

    .coming-soon {
      display: inline-block;

      margin-top: 30px;
      padding: 12px 24px;

      border-radius: 30px;

      background: #f2c94c;
      color: #3d3210;

      font-size: 1rem;
      font-weight: bold;

      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <main class="placeholder">

    <h1>Platicar</h1>

    <p>
      This program is currently being prepared.
      Please return later.
    </p>

    <div class="coming-soon">
      COMING SOON
    </div>

  </main>

</body>
</html>
