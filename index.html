<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrance</title>
<h2>Jimmy was here </h2>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url("./Entrances/p1.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }

    .door {
      position: absolute;
      cursor: pointer;
      background: rgba(255, 0, 0, 0); /* invisible */
    }

    /* LEFT DOOR */
    .door-left {
      left: .2%;
      top: .5%;
      width: 45%;
      height: 89%;
    }

    /* RIGHT DOOR */
    .door-right {
      left: 56%;
      top: 5%;
      width: 27%;
      height: 77%;
    }

    /* TEMPORARY TEST MODE
       Turn opacity on while lining up the doors, then set back to 0.
    */
    /*
    .door-left  { background: rgba(255, 0, 0, 0.20); }
    .door-right { background: rgba(0, 0, 255, 0.20); }
    */

    /* Optional subtle hover outline */
    .door:hover {
      outline: 4px solid rgba(255, 140, 0, 0.45);
      outline-offset: -2px;
    }
  </style>
</head>
<body>

  <div class="screen">
    <div class="door door-left" onclick="goLeftDoor()"></div>
    <div class="door door-right" onclick="goRightDoor()"></div>
  </div>

  <script>
    function goLeftDoor() {
      window.location.href = "./platicar/adult.html";
    }

    function goRightDoor() {
      window.location.href = "./kids_only/game1.html";
    }
  </script>

</body>
</html>
