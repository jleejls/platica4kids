<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plática</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* Full screen image */
  .background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('./images/cover.jpg') no-repeat center center;
    background-size: cover;
  }

  /* Door areas */
  .door {
    position: absolute;
    cursor: pointer;
  }

  /* Adult door */
  .door-adult {
    left: 10%;
    top: 20%;
    width: 30%;
    height: 60%;
  }

  /* Kids door */
  .door-kids {
    right: 10%;
    top: 20%;
    width: 30%;
    height: 60%;
  }

  /* Optional: hover effect (subtle glow) */
  .door:hover {
    outline: 4px solid rgba(255, 140, 0, 0.6);
  }

</style>
</head>

<body>

<div class="background"></div>

<!-- Adult Door -->
<div class="door door-platicaV2\adult" onclick="goAdult()"></div>

<!-- Kids Door -->
<div class="door door-kids" onclick="goKids()"></div>

<script>
  function goAdult() {
    window.location.href = "./adult/index.html";
  }

  function goKids() {
    window.location.href = "./kids/index.html";
  }
</script>

</body>
</html>
